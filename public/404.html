<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>BalamAI</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This script takes the current url and converts the path and query string into just a query string,
      // then redirects the browser to the new url with only a query string and hash fragment,
      // e.g. https://www.foo.tld/one/two?a=b#c -> https://www.foo.tld/?/one/two&a=b#c
      // Note: this must be kept in sync with the redirect checking script in index.html
      var pathSegmentsToKeep = 1;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
